version: 0.2

phases:
  install:
    commands:
      - aws --version
      - ENV_FILE="${ENV_FILE:-dev.env}"
      - test -f "$ENV_FILE"
      - echo "Using env file: $ENV_FILE"
  build:
    commands:
      - ENV_FILE="${ENV_FILE:-dev.env}"
      - set -a; . "./$ENV_FILE"; set +a
      - |
        aws cloudformation package \
          --region "$AWS_REGION" \
          --template-file master.yaml \
          --s3-bucket "$ARTIFACT_BUCKET" \
          --s3-prefix "cfn/$ENV_NAME" \
          --output-template-file master.packaged.yaml
      - |
        aws cloudformation deploy \
          --region "$AWS_REGION" \
          --stack-name "${ENV_NAME}-master" \
          --template-file master.packaged.yaml \
          --capabilities CAPABILITY_NAMED_IAM \
          --role-arn "$CFN_EXEC_ROLE_ARN" \
          --parameter-overrides \
            EnvironmentName="$ENV_NAME" \
            VpcCidr="$VPC_CIDR" \
            PublicSubnetACidr="$PUBLIC_SUBNET_A_CIDR" \
            PublicSubnetBCidr="$PUBLIC_SUBNET_B_CIDR" \
            PrivateSubnetACidr="$PRIVATE_SUBNET_A_CIDR" \
            PrivateSubnetBCidr="$PRIVATE_SUBNET_B_CIDR"

artifacts:
  files:
    - master.packaged.yaml
