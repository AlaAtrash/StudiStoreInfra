AWSTemplateFormatVersion: "2010-09-09"
Description: "Security stack - Security Groups for ALB, ECS, and RDS"

Parameters:
  EnvironmentName:
    Type: String

  VpcId:
    Type: AWS::EC2::VPC::Id

Resources:

  #####################################
  # ALB Security Group (Public)
  #####################################
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} ALB Security Group"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb-sg"

  #####################################
  # ECS Security Group (Private)
  #####################################
  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} ECS Security Group"
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ecs-sg"

  EcsIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: 3000   # change if your Node app uses another port
      ToPort: 3000
      SourceSecurityGroupId: !Ref AlbSecurityGroup

  #####################################
  # RDS Security Group (Private)
  #####################################
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} RDS Security Group"
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-rds-sg"

  RdsIngressFromEcs:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref EcsSecurityGroup

Outputs:

  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup

  EcsSecurityGroupId:
    Value: !Ref EcsSecurityGroup

  RdsSecurityGroupId:
    Value: !Ref RdsSecurityGroup